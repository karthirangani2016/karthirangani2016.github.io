<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEA | LOGIN</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #00aaff; --bg: #0a0e1a; --panel: #111622; --text: #c0c8e0; --dim: #506080; --accent: #00ff88; --border: #1a2540; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .maintenance-overlay {
            position: fixed; inset: 0; background: var(--bg); display: none;
            align-items: center; justify-content: center; z-index: 9999; flex-direction: column;
        }
        .maintenance-overlay.show { display: flex; }
        .maintenance-overlay h1 { color: #ffaa00; font-size: 2rem; margin-bottom: 10px; letter-spacing: 3px; }
        .maintenance-overlay p { color: var(--dim); font-size: 0.9rem; }
        .maintenance-overlay .pi-status { color: #ff4444; font-size: 0.75rem; margin-top: 20px; }
        .maintenance-overlay .blink { animation: blink 1.5s infinite; }
        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
        .login-box { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 40px; width: 360px; }
        .login-box h1 { color: var(--primary); font-size: 1.4rem; text-align: center; margin-bottom: 4px; letter-spacing: 3px; }
        .login-box .sub { color: var(--dim); text-align: center; font-size: 0.75rem; margin-bottom: 24px; letter-spacing: 1px; }
        .login-box input { width: 100%; padding: 10px 12px; margin-bottom: 12px; background: #0a0e1a; border: 1px solid var(--border); color: var(--text); font-family: inherit; font-size: 0.85rem; border-radius: 4px; outline: none; }
        .login-box input:focus { border-color: var(--primary); }
        .login-box button { width: 100%; padding: 10px; margin-bottom: 8px; background: var(--primary); color: #000; border: none; font-family: inherit; font-weight: bold; font-size: 0.85rem; border-radius: 4px; cursor: pointer; }
        .login-box button:hover { background: #00ccff; }
        .login-box .toggle { text-align: center; font-size: 0.75rem; color: var(--dim); cursor: pointer; }
        .login-box .toggle:hover { color: var(--primary); }
        .login-box .error { color: #ff4444; font-size: 0.75rem; text-align: center; margin-bottom: 8px; display: none; }
        .login-box .loading { text-align: center; color: var(--dim); font-size: 0.75rem; display: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="maintenance-overlay" id="maintOverlay">
        <h1 class="blink">SEA//</h1>
        <p>Server is offline or in maintenance</p>
        <p class="pi-status">The Raspberry Pi battlestation is not reachable right now.</p>
    </div>

    <div class="login-box" id="loginBox">
        <h1>SEA//</h1>
        <div class="sub">SYSTEM ACCESS</div>
        <div class="error" id="authError"></div>
        <div class="loading" id="authLoading">Authenticating...</div>
        <input type="text" id="authUser" placeholder="Username" autocomplete="username">
        <input type="password" id="authPass" placeholder="Password" autocomplete="current-password">
        <button id="authBtn">LOGIN</button>
        <div class="toggle" id="authToggle">No account? Register</div>
    </div>

    <div id="chatApp" class="hidden">
        <style>
            .chat-wrap { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
            .chat-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; border-bottom: 1px solid var(--border); background: var(--panel); }
            .chat-header .logo { font-size: 1.2rem; font-weight: bold; color: var(--primary); letter-spacing: 3px; }
            .chat-header .logo span { color: var(--accent); }
            .chat-header .user-info { display: flex; align-items: center; gap: 12px; font-size: 0.75rem; }
            .chat-header .user-info .logout-btn { background: none; border: 1px solid #ff4444; color: #ff4444; padding: 4px 10px; font-family: inherit; font-size: 0.7rem; border-radius: 3px; cursor: pointer; }
            .chat-header .user-info .logout-btn:hover { background: #ff4444; color: #000; }
            .chat-main { display: flex; flex: 1; overflow: hidden; }
            .chat-sidebar { width: 220px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 10px; gap: 8px; flex-shrink: 0; }
            .chat-sidebar button { background: var(--primary); color: #000; border: none; padding: 8px; font-family: inherit; font-weight: bold; cursor: pointer; border-radius: 4px; font-size: 0.75rem; }
            .chat-sidebar button:hover { background: #00ccff; }
            .chat-sidebar input { background: #0a0e1a; border: 1px solid var(--border); color: var(--text); padding: 6px; font-family: inherit; font-size: 0.7rem; border-radius: 3px; }
            #chatList { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; }
            .chat-item { padding: 6px 8px; cursor: pointer; border-radius: 3px; font-size: 0.7rem; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
            .chat-item:hover { background: #1a2540; color: var(--text); }
            .chat-item.active { background: #1a3050; color: var(--primary); }
            .chat-area { flex: 1; display: flex; flex-direction: column; }
            .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
            .msg { max-width: 80%; padding: 10px 14px; border-radius: 6px; font-size: 0.85rem; line-height: 1.5; white-space: pre-wrap; }
            .msg.sea { background: #0d1f3d; border-left: 3px solid var(--primary); align-self: flex-start; }
            .msg.user { background: #1a2a1a; border-left: 3px solid var(--accent); align-self: flex-end; }
            .chat-input { display: flex; padding: 12px 20px; border-top: 1px solid var(--border); background: var(--panel); gap: 10px; }
            .chat-input input { flex: 1; background: #0a0e1a; border: 1px solid var(--border); color: var(--text); padding: 10px 14px; font-family: inherit; font-size: 0.85rem; border-radius: 4px; outline: none; }
            .chat-input input:focus { border-color: var(--primary); }
            .chat-input button { background: var(--primary); color: #000; border: none; padding: 10px 20px; font-family: inherit; font-weight: bold; cursor: pointer; border-radius: 4px; }
            .chat-input button:hover { background: #00ccff; }
        </style>

        <div class="chat-wrap">
            <div class="chat-header">
                <div class="logo">SEA<span>//</span></div>
                <div class="user-info">
                    <span id="displayUser"></span>
                    <button class="logout-btn" id="logoutBtn">LOGOUT</button>
                </div>
            </div>
            <div class="chat-main">
                <div class="chat-sidebar">
                    <button id="newChatBtn">+ NEW CHAT</button>
                    <input type="text" id="chatSearch" placeholder="Search..." autocomplete="off">
                    <div id="chatList"></div>
                </div>
                <div class="chat-area">
                    <div class="chat-messages" id="chatMessages">
                        <div class="msg sea">SEA online. How can I assist you, Sir?</div>
                    </div>
                    <div class="chat-input">
                        <input type="text" id="msgInput" placeholder="Enter command..." autocomplete="off">
                        <button id="sendBtn">Transmit</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let API = 'https://raspberrypi.tail461bf6.ts.net';
        let token = localStorage.getItem('sea_token');
        let serverOnline = false;
        let username = localStorage.getItem('sea_user');
        let currentChatId = null;
        let allChats = [];

        const loginBox = document.getElementById('loginBox');
        const chatApp = document.getElementById('chatApp');
        const authUser = document.getElementById('authUser');
        const authPass = document.getElementById('authPass');
        const authBtn = document.getElementById('authBtn');
        const authToggle = document.getElementById('authToggle');
        const authError = document.getElementById('authError');
        const authLoading = document.getElementById('authLoading');
        const displayUser = document.getElementById('displayUser');
        const logoutBtn = document.getElementById('logoutBtn');
        const chatMessages = document.getElementById('chatMessages');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatList = document.getElementById('chatList');
        const newChatBtn = document.getElementById('newChatBtn');
        const chatSearch = document.getElementById('chatSearch');

        let isRegisterMode = false;

        function showError(msg) {
            authError.textContent = msg;
            authError.style.display = 'block';
        }

        function hideError() {
            authError.style.display = 'none';
        }

        function setLoading(loading) {
            authLoading.style.display = loading ? 'block' : 'none';
            authBtn.disabled = loading;
        }

        function showMaintenance() {
            document.getElementById('maintOverlay').classList.add('show');
        }

        function hideMaintenance() {
            document.getElementById('maintOverlay').classList.remove('show');
        }

        async function authFetch(path, options = {}) {
            const headers = { 'Content-Type': 'application/json' };
            if (token) headers['Authorization'] = 'Bearer ' + token;
            try {
                const res = await fetch(API + path, { headers, ...options });
                const data = await res.json();
                serverOnline = true;
                hideMaintenance();
                return { ok: res.ok, status: res.status, data };
            } catch (e) {
                serverOnline = false;
                showMaintenance();
                return { ok: false, status: 0, data: { error: e.message } };
            }
        }

        async function doAuth(endpoint) {
            const user = authUser.value.trim().toLowerCase();
            const pass = authPass.value.trim();
            if (!user || !pass) { showError('Fill in both fields.'); return; }
            hideError();
            setLoading(true);
            const { ok, status, data } = await authFetch(endpoint, {
                method: 'POST',
                body: JSON.stringify({ username: user, password: pass })
            });
            setLoading(false);
            if (ok && data.token) {
                token = data.token;
                username = data.username;
                localStorage.setItem('sea_token', token);
                localStorage.setItem('sea_user', username);
                showChat();
            } else {
                showError(data.error || 'Something went wrong.');
            }
        }

        authBtn.onclick = () => doAuth(isRegisterMode ? '/auth/register' : '/auth/login');
        authUser.onkeydown = e => { if (e.key === 'Enter') authPass.focus(); };
        authPass.onkeydown = e => { if (e.key === 'Enter') authBtn.click(); };

        authToggle.onclick = () => {
            isRegisterMode = !isRegisterMode;
            authBtn.textContent = isRegisterMode ? 'REGISTER' : 'LOGIN';
            authToggle.textContent = isRegisterMode ? 'Already have an account? Login' : "No account? Register";
            hideError();
        };

        async function verifyToken() {
            const { ok } = await authFetch('/auth/verify');
            if (ok) showChat();
            else { token = null; username = null; localStorage.removeItem('sea_token'); localStorage.removeItem('sea_user'); showLogin(); }
        }

        function showLogin() { loginBox.classList.remove('hidden'); chatApp.classList.add('hidden'); authUser.focus(); }
        function showChat() { loginBox.classList.add('hidden'); chatApp.classList.remove('hidden'); displayUser.textContent = username; fetchChats(); msgInput.focus(); }

        logoutBtn.onclick = () => {
            token = null; username = null;
            localStorage.removeItem('sea_token'); localStorage.removeItem('sea_user');
            showLogin();
        };

        async function fetchChats() {
            const { ok, data } = await authFetch('/chats');
            if (ok) { allChats = data; renderChats(); }
        }

        function renderChats() {
            chatList.innerHTML = '';
            allChats.forEach(c => {
                const el = document.createElement('div');
                el.className = 'chat-item' + (c.id === currentChatId ? ' active' : '');
                el.textContent = c.title;
                el.onclick = () => loadChat(c.id);
                chatList.appendChild(el);
            });
        }

        async function newChat() {
            const { ok, data } = await authFetch('/chats/new', { method: 'POST' });
            if (ok) {
                currentChatId = data.id;
                chatMessages.innerHTML = '<div class="msg sea">New session initialized. SEA standing by, Sir.</div>';
                fetchChats();
            }
        }

        async function loadChat(id) {
            currentChatId = id;
            const { ok, data } = await authFetch('/chats/' + id);
            if (ok) {
                chatMessages.innerHTML = '';
                if (data.messages.length === 0) {
                    chatMessages.innerHTML = '<div class="msg sea">Session active. Standing by, Sir.</div>';
                } else {
                    data.messages.forEach(m => {
                        const el = document.createElement('div');
                        el.className = 'msg ' + m.role;
                        el.textContent = m.text;
                        chatMessages.appendChild(el);
                    });
                }
                chatMessages.scrollTop = chatMessages.scrollHeight;
                renderChats();
            }
        }

        async function sendMessage() {
            const msg = msgInput.value.trim();
            if (!msg) return;
            if (!currentChatId) { await newChat(); if (!currentChatId) return; }
            msgInput.value = '';
            const el = document.createElement('div');
            el.className = 'msg user'; el.textContent = msg;
            chatMessages.appendChild(el);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            const { ok, data } = await authFetch('/ask', {
                method: 'POST',
                body: JSON.stringify({ message: msg, chat_id: currentChatId })
            });
            if (ok && data.reply) {
                const r = document.createElement('div');
                r.className = 'msg sea'; r.textContent = data.reply;
                chatMessages.appendChild(r);
                chatMessages.scrollTop = chatMessages.scrollHeight;
                fetchChats();
            }
        }

        newChatBtn.onclick = newChat;
        sendBtn.onclick = sendMessage;
        msgInput.onkeydown = e => { if (e.key === 'Enter') sendMessage(); };
        chatSearch.oninput = e => {
            const term = e.target.value.toLowerCase();
            renderChats(allChats.filter(c => c.title.toLowerCase().includes(term)));
        };

        fetch(API + '/', { method: 'HEAD' }).then(()=>{serverOnline=true;hideMaintenance();}).catch(()=>{showMaintenance();});
        if (token && username) verifyToken(); else showLogin();
    </script>
</body>
</html>
