<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexSolve Admin – Messages</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #020b18;
      --bg-card: #0a1628;
      --blue: #2196f3;
      --blue-bright: #00b4ff;
      --border: rgba(33,150,243,0.15);
      --border-bright: rgba(33,150,243,0.4);
      --text: #e8f4fd;
      --muted: #4a7a9b;
      --gradient: linear-gradient(135deg, #2196f3, #00b4ff);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background-image:
        linear-gradient(rgba(33,150,243,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(33,150,243,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
    }

    /* ── Login ── */
    .login-box {
      background: var(--bg-card);
      border: 1px solid var(--border-bright);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 0 60px rgba(33,150,243,0.12);
    }

    .login-logo { width: 80px; margin-bottom: 20px; }

    .login-box h1 {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .login-box p {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 32px;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 16px;
    }

    .input-wrap i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.9rem;
    }

    .input-wrap input {
      width: 100%;
      background: rgba(33,150,243,0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 16px 13px 40px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: 0.3s;
    }

    .input-wrap input:focus {
      border-color: var(--blue);
      background: rgba(33,150,243,0.08);
      box-shadow: 0 0 0 3px rgba(33,150,243,0.12);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--gradient);
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: 0.3s;
      box-shadow: 0 4px 20px rgba(33,150,243,0.35);
    }

    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(33,150,243,0.5); }

    .error-msg {
      display: none;
      color: #f87171;
      font-size: 0.85rem;
      margin-top: 12px;
      padding: 10px;
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      border-radius: 8px;
    }
    .error-msg.show { display: block; }

    /* ── Dashboard ── */
    .dashboard { display: none; width: 100%; max-width: 860px; }
    .dashboard.show { display: block; }

    .dash-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .dash-title {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .dash-title img { width: 44px; }

    .dash-title h2 { font-size: 1.4rem; font-weight: 800; }
    .dash-title span { font-size: 0.82rem; color: var(--muted); display: block; }

    .btn-logout {
      background: rgba(248,113,113,0.12);
      border: 1px solid rgba(248,113,113,0.3);
      color: #f87171;
      padding: 8px 18px;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: 0.3s;
    }
    .btn-logout:hover { background: rgba(248,113,113,0.2); }

    .msg-count {
      background: rgba(33,150,243,0.1);
      border: 1px solid var(--border-bright);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      color: var(--blue-bright);
      font-weight: 600;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty-state i { font-size: 3rem; margin-bottom: 16px; opacity: 0.4; }
    .empty-state p { font-size: 1rem; }

    .msg-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
      transition: 0.3s;
      position: relative;
    }

    .msg-card:hover { border-color: var(--border-bright); }

    .msg-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .msg-sender { display: flex; align-items: center; gap: 12px; }

    .msg-avatar {
      width: 42px; height: 42px;
      background: var(--gradient);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .msg-name { font-size: 0.95rem; font-weight: 700; }
    .msg-email { font-size: 0.8rem; color: var(--blue-bright); }

    .msg-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }

    .msg-date { font-size: 0.75rem; color: var(--muted); }

    .btn-delete {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.25);
      color: #f87171;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: 0.3s;
    }
    .btn-delete:hover { background: rgba(248,113,113,0.2); }

    .msg-subject {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .msg-body {
      font-size: 0.92rem;
      color: #a8c8e8;
      line-height: 1.7;
      background: rgba(33,150,243,0.04);
      border-left: 3px solid var(--blue);
      padding: 12px 16px;
      border-radius: 0 8px 8px 0;
    }

    @media (max-width: 520px) {
      .login-box { padding: 32px 20px; }
      .msg-meta { align-items: flex-start; }
    }
  </style>
</head>
<body>

  <!-- Login -->
  <div class="login-box" id="loginBox">
    <img src="logo.png" alt="NexSolve" class="login-logo" />
    <h1>Admin Access</h1>
    <p>Enter your password to view all messages</p>
    <form id="loginForm">
      <div class="input-wrap">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="passwordInput" placeholder="Enter password" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn-login">
        <i class="fa-solid fa-right-to-bracket"></i> Login
      </button>
      <div class="error-msg" id="errorMsg">
        <i class="fa-solid fa-circle-exclamation"></i> Incorrect password. Try again.
      </div>
    </form>
  </div>

  <!-- Dashboard -->
  <div class="dashboard" id="dashboard">
    <div class="dash-header">
      <div class="dash-title">
        <img src="logo.png" alt="NexSolve" />
        <div>
          <h2>Messages Inbox</h2>
          <span>NexSolve Tech Admin Panel</span>
        </div>
      </div>
      <button class="btn-logout" id="logoutBtn">
        <i class="fa-solid fa-right-from-bracket"></i> Logout
      </button>
    </div>
    <div class="msg-count" id="msgCount"></div>
    <div id="messagesList"></div>
  </div>

  <script>
    let currentPassword = '';

    const loginBox = document.getElementById('loginBox');
    const dashboard = document.getElementById('dashboard');
    const loginForm = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const msgCount = document.getElementById('msgCount');
    const messagesList = document.getElementById('messagesList');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('passwordInput').value;
      errorMsg.classList.remove('show');

      try {
        const res = await fetch('/api/admin/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });

        if (!res.ok) {
          errorMsg.classList.add('show');
          return;
        }

        const data = await res.json();
        currentPassword = password;
        loginBox.style.display = 'none';
        dashboard.classList.add('show');
        renderMessages(data.messages);
      } catch {
        errorMsg.classList.add('show');
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      currentPassword = '';
      loginBox.style.display = '';
      dashboard.classList.remove('show');
      document.getElementById('passwordInput').value = '';
    });

    function renderMessages(messages) {
      if (messages.length === 0) {
        msgCount.textContent = 'No messages yet.';
        messagesList.innerHTML = `
          <div class="empty-state">
            <i class="fa-solid fa-inbox"></i>
            <p>No messages have been sent yet.</p>
          </div>`;
        return;
      }

      msgCount.innerHTML = `<i class="fa-solid fa-envelope"></i> &nbsp;${messages.length} message${messages.length > 1 ? 's' : ''} received`;

      messagesList.innerHTML = messages.map(m => `
        <div class="msg-card" id="msg-${m.id}">
          <div class="msg-card-header">
            <div class="msg-sender">
              <div class="msg-avatar">${m.name.slice(0,2).toUpperCase()}</div>
              <div>
                <div class="msg-name">${escHtml(m.name)}</div>
                <div class="msg-email">${escHtml(m.email)}</div>
              </div>
            </div>
            <div class="msg-meta">
              <span class="msg-date"><i class="fa-regular fa-clock"></i> ${escHtml(m.date)}</span>
              <button class="btn-delete" onclick="deleteMessage(${m.id})">
                <i class="fa-solid fa-trash"></i> Delete
              </button>
            </div>
          </div>
          <div class="msg-subject">Subject: ${escHtml(m.subject)}</div>
          <div class="msg-body">${escHtml(m.message)}</div>
        </div>
      `).join('');
    }

    async function deleteMessage(id) {
      if (!confirm('Delete this message?')) return;
      const res = await fetch(`/api/admin/messages/${id}`, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: currentPassword })
      });
      if (res.ok) {
        document.getElementById(`msg-${id}`).remove();
        const remaining = document.querySelectorAll('.msg-card').length;
        msgCount.innerHTML = remaining
          ? `<i class="fa-solid fa-envelope"></i> &nbsp;${remaining} message${remaining > 1 ? 's' : ''} received`
          : 'No messages yet.';
        if (remaining === 0) {
          messagesList.innerHTML = `
            <div class="empty-state">
              <i class="fa-solid fa-inbox"></i>
              <p>No messages have been sent yet.</p>
            </div>`;
        }
      }
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
